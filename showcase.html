<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wifuframe Showcase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="wifuframe.css">
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
    <script src="wifuframe.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <style>
        .editor-container {
            border: 1px solid #333;
            border-radius: 0.5rem;
            overflow: hidden;
        }
        @media (max-width: 1024px) {
            .example-grid {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen" style="background-color: #0a0a0a;">
    <div class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-center mb-12">Wifuframe Showcase</h1>

        <div class="space-y-8" id="examples">
            <!-- Examples will be generated here -->
        </div>
    </div>

    <script>
        const examples = [
            {
                name: "Basic Elements",
                code: `page:
  - title: Hello World
  - text: This is a simple text element
  - button: Click Me`
            },
            {
                name: "Button Variants",
                code: `page:
  - button:
      text: Primary
      type: primary
  - button:
      text: Danger
      type: danger
  - button:
      text: Success
      type: success`
            },
            {
                name: "Text Colors",
                code: `page:
  - text:
      value: Secondary text
      color: secondary
  - text:
      value: Success message
      color: success
  - text:
      value: Error message
      color: danger
  - text:
      value: Primary info
      color: primary`
            },
            {
                name: "Layout - Row & Columns",
                code: `page:
  - row:
      - col:
          - title: Column 1
          - text: First column content
      - col:
          - title: Column 2
          - text: Second column content
      - col:
          - title: Column 3
          - text: Third column content`
            },
            {
                name: "Card Block",
                code: `page:
  - block:
      - title: Card Title
      - text: Card description text
      - row:
          - button:
              text: Cancel
              type: secondary
          - spacer:
          - button:
              text: Save
              type: primary`
            },
            {
                name: "Form Elements",
                code: `page:
  - title: Login Form
  - text: Please enter your credentials
  - input:
      value: Username
  - input:
      value: Password
  - row:
      - button:
          text: Login
          type: primary
      - button:
          text: Forgot Password`
            },
            {
                name: "Image Placeholder",
                code: `page:
  - title: Gallery
  - image: Product Photo
  - image: Another Image
  - image: Third Image`
            },
            {
                name: "Device Preview - Mobile",
                code: `---
device: mobile
page:
  - title: Mobile App
  - row:
      - button: Home
      - button: Profile
      - button: Settings
  - text: Welcome to the mobile app
  - image: Screenshot
  - button:
      text: Get Started
      type: primary`
            },
            {
                name: "Device Preview - Desktop",
                code: `---
device: desktop
page:
  - title: Desktop Dashboard
  - row:
      - block:
          - title: Stats
          - text: 1,234 users
      - block:
          - title: Revenue
          - text: $12,345
      - block:
          - title: Growth
          - text: +23%`
            },
            {
                name: "Interactive Buttons",
                code: `page:
  - title: Interactive Demo
  - button:
      text: Show Alert
      alert: Hello from Wifuframe!
  - button:
      text: Confirm Action
      confirm: Are you sure you want to proceed?`
            },
            {
                name: "Multiple Devices",
                code: `---
device:
  - mobile
  - desktop
page:
  - title: Responsive Design
  - row:
      - col:
          - image: Feature 1
          - text: First feature
      - col:
          - image: Feature 2
          - text: Second feature`
            }
        ];

        const editors = [];

        function renderExample(index, code) {
            const groups = Wifuframe.parse(code);
            return Wifuframe.render(groups);
        }

        function createExampleElement(example, index) {
            const container = document.createElement('div');
            container.className = 'example-grid grid gap-6';
            container.style.gridTemplateColumns = '1fr 2fr';

            const editorDiv = document.createElement('div');
            editorDiv.className = 'editor-container';
            editorDiv.style.height = '300px';
            editorDiv.id = `editor-${index}`;

            const previewDiv = document.createElement('div');
            previewDiv.className = 'w-2/3 mx-auto';
            previewDiv.innerHTML = `<div class="wf">${renderExample(index, example.code)}</div>`;
            previewDiv.id = `preview-${index}`;

            container.appendChild(editorDiv);
            container.appendChild(previewDiv);

            return container;
        }

        function initEditors() {
            require.config({
                paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }
            });

            require(['vs/editor/editor.main'], function() {
                monaco.editor.defineTheme('wifuframeDark', {
                    base: 'vs-dark',
                    inherit: true,
                    rules: [
                        { token: 'keyword', foreground: '7FB77F' },
                        { token: 'string', foreground: 'CE9178' },
                        { token: 'number', foreground: 'B5CEA8' },
                        { token: 'comment', foreground: '6A9955' }
                    ],
                    colors: {
                        'editor.background': '#1e1e1e',
                        'editor.lineHighlightBackground': '#2a2a2a',
                        'editorLineNumber.foreground': '#666666',
                        'editor.selectionBackground': '#264F78'
                    }
                });

                examples.forEach((example, index) => {
                    const container = createExampleElement(example, index);
                    document.getElementById('examples').appendChild(container);

                    const editor = monaco.editor.create(document.getElementById(`editor-${index}`), {
                        value: example.code,
                        language: 'yaml',
                        theme: 'wifuframeDark',
                        automaticLayout: true,
                        minimap: { enabled: false },
                        scrollBeyondLastLine: false,
                        fontSize: 13,
                        lineNumbers: 'off',
                        roundedSelection: false,
                        padding: { top: 16, bottom: 16 },
                        wordWrap: 'on',
                        renderLineHighlight: 'none',
                        overviewRulerLanes: 0,
                        hideCursorInOverviewRuler: true,
                        overviewRulerBorder: false
                    });

                    editors.push(editor);

                    let debounceTimer;
                    editor.onDidChangeModelContent(() => {
                        clearTimeout(debounceTimer);
                        debounceTimer = setTimeout(() => {
                            const newCode = editor.getValue();
                            try {
                                const html = renderExample(index, newCode);
                                document.getElementById(`preview-${index}`).innerHTML = `<div class="wf">${html}</div>`;
                            } catch (e) {
                                console.error('Parse error:', e);
                            }
                        }, 300);
                    });
                });
            });
        }

        document.addEventListener('DOMContentLoaded', initEditors);
    </script>
</body>
</html>
